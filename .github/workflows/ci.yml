name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same PR/branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Tests that need network or proprietary models skip cleanly when these
      # are unset; we make sure the env is empty here so CI never hits a real
      # Anthropic / HuggingFace endpoint.
      ANTHROPIC_API_KEY: ""
      HUGGINGFACE_TOKEN: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q --tb=short
        # Heavy-AI tests (RIFE, Real-ESRGAN, LaMa, pyannote) skip cleanly on
        # CI because the binaries / models aren't installed — that's by design.

  frontend:
    name: frontend (tsc + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7
